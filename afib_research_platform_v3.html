<title>AFib Research Platform — Epic Cosmos Workflow</title>
<style>
  :root{
    --font-display: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --bg:#eaeef5; --surface:#ffffff; --surface-2:#f5f7fc; --surface-3:#eef1f8;
    --border:#dde2ec; --border-2:#cbd2e0;
    --ink:#111726; --ink-2:#54607a; --ink-3:#8791a6;
    --accent:#5850e6; --accent-2:#7a72ff; --accent-soft:#ecebfd;
    --space:#070b15;
    --role-exposure:#2a78d6; --role-outcome:#e34948; --role-adjustment:#1baf7a; --role-subgroup:#eda100;
    --good:#0ca30c; --warning:#c47f00; --critical:#d03b3b;
    --good-soft:#e6f5e6; --warning-soft:#faf0da; --critical-soft:#fbe7e7;
    --shadow-sm:0 1px 2px rgba(16,22,38,.06),0 1px 3px rgba(16,22,38,.05);
    --shadow-md:0 4px 14px rgba(16,22,38,.08),0 2px 6px rgba(16,22,38,.05);
    --radius:14px; --radius-sm:9px;
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#0a0e17; --surface:#141a26; --surface-2:#1a212f; --surface-3:#212a3b;
    --border:#28313f; --border-2:#36404f; --ink:#eef2f8; --ink-2:#a7b1c4; --ink-3:#6d778c;
    --accent:#8b83ff; --accent-2:#a49dff; --accent-soft:#20233f;
    --role-exposure:#3987e5; --role-outcome:#e66767; --role-adjustment:#22b98a; --role-subgroup:#e0a12a;
    --good:#25b825; --warning:#e0a020; --critical:#e35a5a; --good-soft:#132a13; --warning-soft:#2c2410; --critical-soft:#2e1414;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 6px 20px rgba(0,0,0,.45);
  }}
  :root[data-theme="light"]{
    --bg:#eaeef5; --surface:#ffffff; --surface-2:#f5f7fc; --surface-3:#eef1f8;
    --border:#dde2ec; --border-2:#cbd2e0; --ink:#111726; --ink-2:#54607a; --ink-3:#8791a6;
    --accent:#5850e6; --accent-2:#7a72ff; --accent-soft:#ecebfd;
    --role-exposure:#2a78d6; --role-outcome:#e34948; --role-adjustment:#1baf7a; --role-subgroup:#eda100;
    --good:#0ca30c; --warning:#c47f00; --critical:#d03b3b; --good-soft:#e6f5e6; --warning-soft:#faf0da; --critical-soft:#fbe7e7;
    --shadow-sm:0 1px 2px rgba(16,22,38,.06),0 1px 3px rgba(16,22,38,.05); --shadow-md:0 4px 14px rgba(16,22,38,.08),0 2px 6px rgba(16,22,38,.05);
  }
  :root[data-theme="dark"]{
    --bg:#0a0e17; --surface:#141a26; --surface-2:#1a212f; --surface-3:#212a3b;
    --border:#28313f; --border-2:#36404f; --ink:#eef2f8; --ink-2:#a7b1c4; --ink-3:#6d778c;
    --accent:#8b83ff; --accent-2:#a49dff; --accent-soft:#20233f;
    --role-exposure:#3987e5; --role-outcome:#e66767; --role-adjustment:#22b98a; --role-subgroup:#e0a12a;
    --good:#25b825; --warning:#e0a020; --critical:#e35a5a; --good-soft:#132a13; --warning-soft:#2c2410; --critical-soft:#2e1414;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 6px 20px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{margin:0;text-wrap:balance;font-weight:600}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .mono{font-family:var(--font-mono)} .tnum{font-variant-numeric:tabular-nums}
  .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:4px}

  /* ---------- App shell ---------- */
  .app{display:grid;grid-template-columns:246px 1fr;min-height:100vh}
  .side{position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--surface);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;gap:3px}
  .brand{padding:4px 8px 14px;display:flex;gap:10px;align-items:center}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex:none}
  .brand .bt{font-family:var(--font-display);font-size:15px;font-weight:600;line-height:1.1}
  .brand .bs{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
  .navlabel{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);padding:14px 8px 6px}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:9px;cursor:pointer;color:var(--ink-2);font-size:13.5px;position:relative;border:1px solid transparent}
  .nav:hover{background:var(--surface-2)}
  .nav.on{background:var(--accent-soft);color:var(--accent);font-weight:600;border-color:transparent}
  .nav .num{font-family:var(--font-mono);font-size:11px;width:26px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--surface-3);color:var(--ink-3);flex:none}
  .nav.on .num{background:var(--accent);color:#fff}
  .nav.done .num{background:var(--good);color:#fff}
  .nav .cp{margin-left:auto;font-size:9px;color:var(--accent)}
  .nav .txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .side .foot{margin-top:auto;padding:12px 8px 2px;font-size:11px;color:var(--ink-3);border-top:1px solid var(--border)}

  main{min-width:0}
  .page{max-width:1080px;margin:0 auto;padding:34px 30px 70px}
  .phead{margin-bottom:26px}
  .phead .eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .phead .cpflag{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px}
  .phead h1{font-family:var(--font-display);font-size:clamp(26px,3.6vw,38px);line-height:1.05;letter-spacing:-.015em}
  .phead p.sub{margin:12px 0 0;color:var(--ink-2);font-size:16px;max-width:70ch}
  .pnav{display:flex;justify-content:space-between;gap:12px;margin-top:44px;padding-top:22px;border-top:1px solid var(--border)}
  .pnav a{display:flex;flex-direction:column;gap:2px;padding:11px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);max-width:46%}
  .pnav a:hover{border-color:var(--accent);text-decoration:none}
  .pnav a .d{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
  .pnav a .t{font-weight:600;color:var(--ink)}
  .pnav a.next{margin-left:auto;text-align:right}

  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border);padding:10px;gap:6px;align-items:center}
    .brand,.navlabel,.side .foot{display:none}
    .nav{flex:none;padding:7px 11px}.nav .txt{display:none}.nav.on .txt{display:inline}
  }

  /* ---------- shared components ---------- */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm)}
  .card h3{font-size:16px;margin-bottom:4px}
  .card .lead{color:var(--ink-2);font-size:13.5px}
  .muted{color:var(--ink-2)} .small{font-size:13px}
  .tag{font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .tag.role{color:#fff}.tag.cat{background:var(--surface-3);color:var(--ink-2)}.tag.paper{background:var(--accent-soft);color:var(--accent)}
  .tag .rd{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6)}
  .badge{font-family:var(--font-mono);font-size:10px;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;font-weight:600}
  .a-High{background:var(--good-soft);color:var(--good)}.a-Medium{background:var(--warning-soft);color:var(--warning)}.a-Low{background:var(--critical-soft);color:var(--critical)}
  .btn{font:inherit;font-size:13px;padding:9px 16px;border-radius:9px;border:1px solid var(--border-2);background:var(--surface);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent-2);color:#fff}
  .btn.sm{padding:6px 12px;font-size:12.5px}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13.5px}
  .kv:last-child{border-bottom:none} .kv .k{color:var(--ink-2)} .kv .v{font-weight:600;text-align:right}
  .callout{border-left:3px solid var(--accent);background:var(--accent-soft);padding:12px 15px;border-radius:0 9px 9px 0;font-size:13.5px;color:var(--ink-2)}
  .callout b{color:var(--ink)}
  .warnbox{border-left:3px solid var(--warning);background:var(--warning-soft);padding:12px 15px;border-radius:0 9px 9px 0;font-size:13.5px}
  table.t{width:100%;border-collapse:collapse;font-size:13px}
  table.t th{text-align:left;font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);padding:8px 10px;border-bottom:1px solid var(--border-2)}
  table.t td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
  .scrollx{overflow-x:auto}
  .chkline{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm)}
  .stat .v{font-family:var(--font-display);font-size:32px;font-weight:600;letter-spacing:-.02em;line-height:1}
  .stat .k{font-family:var(--font-mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
  input[type=text],textarea,select{font:inherit;color:var(--ink);background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;width:100%;outline:none}
  input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent)}
  label.fl{font-size:12.5px;font-weight:600;color:var(--ink-2);display:block;margin:0 0 5px}
  .cbx{appearance:none;width:19px;height:19px;border:1.5px solid var(--border-2);border-radius:5px;cursor:pointer;position:relative;flex:none;background:var(--surface)}
  .cbx:checked{background:var(--accent);border-color:var(--accent)}
  .cbx:checked::after{content:"";position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #fff;border-width:0 2.2px 2.2px 0;transform:rotate(42deg)}
  code.j{display:block;white-space:pre;font-family:var(--font-mono);font-size:12px;background:var(--space);color:#c9d3ea;padding:15px 16px;border-radius:10px;overflow-x:auto;line-height:1.5}
  code.j .k{color:#8b9dc9}code.j .s{color:#8fd6a0}code.j .n{color:#e0a55b}

  /* ---------- Home ---------- */
  .hero{position:relative;border-radius:20px;overflow:hidden;background:var(--space);color:#eaeef7;padding:44px 40px 40px;margin-bottom:24px}
  #heroCanvas{position:absolute;inset:0;width:100%;height:100%}
  .hero .inner{position:relative;z-index:2;max-width:64ch}
  .hero h1{font-family:var(--font-display);font-size:clamp(30px,4.6vw,50px);line-height:1.02;letter-spacing:-.015em}
  .hero h1 em{font-style:italic;color:var(--accent-2)}
  .hero p{margin:16px 0 0;color:#b9c2da;font-size:17px}
  .hero .cta{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap}
  .hero .cta .btn.primary{background:var(--accent-2);border-color:var(--accent-2)}
  .hero .cta .btn.ghost{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:#eaeef7}
  .layers{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:760px){.layers{grid-template-columns:1fr}.hero{padding:32px 22px}}
  .layer{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
  .layer .ln{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
  .layer h3{margin:7px 0 6px;font-size:17px}
  .layer p{color:var(--ink-2);font-size:13.5px;margin:0}
  .layer .st{margin-top:12px;font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}
  .flowmap{display:grid;grid-template-columns:repeat(9,1fr);gap:7px}
  @media(max-width:900px){.flowmap{grid-template-columns:repeat(3,1fr)}}
  .fm{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 10px;cursor:pointer;min-height:96px;display:flex;flex-direction:column;gap:4px;transition:transform .12s,border-color .12s;box-shadow:var(--shadow-sm)}
  .fm:hover{transform:translateY(-3px);border-color:var(--accent)}
  .fm.cp{border-color:var(--accent)}
  .fm .n{font-family:var(--font-mono);font-size:10px;color:var(--accent);font-weight:700}
  .fm .t{font-size:12px;font-weight:600;line-height:1.15}
  .fm .cpx{margin-top:auto;font-family:var(--font-mono);font-size:8px;letter-spacing:.08em;color:var(--accent)}

  /* ---------- Literature map (Step 2) — MedViz-style embedding ---------- */
  .litmap{background:var(--space);border:1px solid #1b2437;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md)}
  .litbar{display:flex;gap:13px;align-items:center;flex-wrap:wrap;padding:11px 15px;border-bottom:1px solid rgba(255,255,255,.07);color:#c3ccdf;font-size:12.5px}
  .litbar .ds{font-size:12px;color:#9aa6c0}
  .litbar .ctl{display:flex;align-items:center;gap:6px}
  .litbar label{color:#8c98b3;font-family:var(--font-mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase}
  .litbar select{background:rgba(255,255,255,.06);color:#dbe2f0;border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:5px 8px;font-size:12px;outline:none}
  .litbar .tog{cursor:pointer;user-select:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:5px 11px;color:#aab4cb}
  .litbar .tog.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .litbar .search2{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:5px 9px;color:#8c98b3}
  .litbar .search2 input{background:none;border:none;color:#eaeef7;font:inherit;font-size:12px;outline:none;width:130px}
  .litstage{position:relative}
  #mapCanvas{display:block;width:100%;height:480px;cursor:grab}
  @media(max-width:640px){#mapCanvas{height:390px}}
  .zoomctl{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:5px}
  .zoomctl button{width:30px;height:30px;border-radius:8px;background:rgba(8,12,22,.72);border:1px solid rgba(255,255,255,.14);color:#c9d2e4;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .zoomctl button:hover{border-color:var(--accent-2);color:#fff}
  .lithist{display:flex;align-items:flex-end;gap:2px;height:62px;padding:8px 15px 8px;border-top:1px solid rgba(255,255,255,.07)}
  .lithist .hb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;justify-content:flex-end}
  .lithist .hb .bar{width:80%;background:rgba(120,135,180,.42);border-radius:2px 2px 0 0;min-height:3px;transition:background .1s}
  .lithist .hb.on .bar,.lithist .hb:hover .bar{background:var(--accent-2)}
  .lithist .hb .yl{font-family:var(--font-mono);font-size:9px;color:#8592ac}
  .map-legend{position:absolute;right:14px;top:14px;display:flex;flex-direction:column;gap:5px;background:rgba(8,12,22,.66);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:9px 11px;max-height:calc(100% - 28px);overflow-y:auto}
  .map-legend .lg{display:flex;align-items:center;gap:7px;font-size:11px;color:#c9d2e4}
  .map-legend .dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px currentColor;flex:none}
  .star-tip{position:absolute;pointer-events:none;z-index:5;max-width:290px;background:rgba(10,14,24,.94);border:1px solid rgba(255,255,255,.14);border-radius:11px;padding:12px 13px;color:#eaeef7;font-size:12.5px;box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;transform:translateY(4px);transition:opacity .12s}
  .star-tip.show{opacity:1;transform:translateY(0)}
  .star-tip .id{font-family:var(--font-mono);font-size:10.5px;color:var(--accent-2)}
  .star-tip .ti{font-weight:600;margin:3px 0 6px;line-height:1.3;color:#fff}
  .star-tip .rl{display:flex;gap:6px;margin-top:3px;color:#aeb8cd}.star-tip .rl b{color:#dbe2f0}

  /* paper list */
  .plist{display:flex;flex-direction:column;gap:8px}
  .prow{display:grid;grid-template-columns:22px 1fr auto;gap:12px;align-items:start;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow-sm)}
  .prow.ex{opacity:.5}
  .prow .pid{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3)}
  .prow .pt{font-size:13.5px;font-weight:600;margin:2px 0 6px;line-height:1.3}
  .prow .ptags{display:flex;gap:6px;flex-wrap:wrap}
  .prow .pside{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:90px;font-size:11px}
  .evi{font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:20px}
  .evi.High{background:var(--good-soft);color:var(--good)}.evi.Medium{background:var(--warning-soft);color:var(--warning)}.evi.Low{background:var(--critical-soft);color:var(--critical)}

  /* Step 3 extraction */
  .xcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
  .xcard .xh{padding:14px 18px;cursor:pointer;display:flex;gap:12px;align-items:center}
  .xcard .xh:hover{background:var(--surface-2)}
  .xcard .xh .pid{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3)}
  .xcard .xh .tt{font-weight:600;font-size:14.5px}
  .xcard .xh .chev{margin-left:auto;color:var(--ink-3);transition:transform .15s}
  .xcard.open .xh .chev{transform:rotate(90deg)}
  .xcard .xb{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
  .xcard.open .xb{display:block}
  .xb .field{padding:11px 0;border-bottom:1px solid var(--border)}
  .xb .field:last-child{border-bottom:none}
  .xb .fl2{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:3px}
  .xb .fv{font-size:13.5px;color:var(--ink)}
  .contra{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--warning);border-radius:0 var(--radius) var(--radius) 0;padding:15px 18px;box-shadow:var(--shadow-sm)}
  .contra .ctopic{font-weight:600;font-size:15px;margin-bottom:11px}
  .contra .cpair{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:11px}
  .contra .pchip{font-size:12px;font-weight:600;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;padding:5px 10px;color:var(--ink);text-decoration:none}
  .contra .pchip:hover{border-color:var(--accent);color:var(--accent)}
  .contra .vs{font-family:var(--font-mono);font-size:10.5px;color:var(--warning);white-space:nowrap;font-weight:600}
  .contra .cfield{display:grid;grid-template-columns:132px 1fr;gap:12px;padding:8px 0;border-top:1px solid var(--border);font-size:13px;color:var(--ink-2);line-height:1.45}

<script>

const D=RAW;

const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
function family(ds){ds=(ds||"").toLowerCase();
  if(ds.includes("gwtg"))return"GWTG-AFIB";if(ds.includes("ncdr"))return"NCDR";if(ds.includes("finacaf"))return"FinACAF";
  if(ds.includes("garfield"))return"GARFIELD-AF";if(ds.includes("cosmos")||ds.includes("ehr"))return"EHR / Cosmos";return"US administrative";}
const FAMILIES=["GWTG-AFIB","NCDR","FinACAF","GARFIELD-AF","EHR / Cosmos","US administrative"];
const FAM_COLOR={"GWTG-AFIB":"#5b8def","NCDR":"#c77dff","FinACAF":"#38d9a9","GARFIELD-AF":"#ffb454","EHR / Cosmos":"#4dd0e1","US administrative":"#ff8fa3"};
const FAM_ANCHOR={"GWTG-AFIB":[.20,.30],"NCDR":[.50,.24],"FinACAF":[.80,.34],"GARFIELD-AF":[.24,.72],"EHR / Cosmos":[.54,.74],"US administrative":[.82,.70]};
function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return(h>>>0)/4294967295;}

function matchReason(p){const hay=((p.module||"")+" "+(p.exposure||"")+" "+(p.primary_outcome||"")+" "+(p.secondary_outcomes||"")+" "+(p.subgroups||"")).toLowerCase();const bits=[];
  if(/rhythm|rate|cardiovers|ablation|antiarrhythmic|management|treatment|laao/.test(hay))bits.push("informs the rhythm- vs rate-control exposure");
  if(/anticoag|oac|doac|warfarin/.test(hay))bits.push("covers anticoagulation quality");

  return "Relevant because it "+bits.join(", ")+"; shares "+p.nlinks+" variables with the question scope.";}

/* ===================== router ===================== */
let cleanup=null;
function go(){
  let id=(location.hash||"#home").slice(1);
  if(!routeById[id])id="home";
  const r=routeById[id];
  if(cleanup){cleanup();cleanup=null;}
  const main=document.getElementById("main");
  const out=r.render();
  main.innerHTML=typeof out==="string"?out:out.html;
  if(out&&out.mount)cleanup=out.mount(main)||null;
  document.querySelectorAll(".nav").forEach(n=>n.classList.toggle("on",n.dataset.id===id));

  document.querySelector("main").scrollTop=0;window.scrollTo(0,0);

function heroStars(cv){
  if(!cv)return null;const ctx=cv.getContext("2d");let raf,alive=true;const DPR=Math.min(devicePixelRatio||1,2);
  let stars=[];
  function size(){const r=cv.getBoundingClientRect();cv.width=r.width*DPR;cv.height=r.height*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);cv._w=r.width;cv._h=r.height;
    stars=[];for(let i=0;i<90;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.2,ph:Math.random()*7});}
  size();const on=()=>size();window.addEventListener("resize",on);const t0=performance.now();
  (function loop(now){if(!alive)return;const t=(now-t0)/1000,W=cv._w,H=cv._h;ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W*.7,H*.3,10,W*.7,H*.3,W*.8);g.addColorStop(0,"rgba(122,114,255,.18)");g.addColorStop(1,"rgba(7,11,21,0)");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{const a=REDUCED?.6:.4+.4*Math.sin(t*1.2+s.ph);ctx.globalAlpha=a;ctx.fillStyle="#c3ccea";ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,7);ctx.fill();});
    ctx.globalAlpha=1;raf=requestAnimationFrame(loop);})(t0);
  return ()=>{alive=false;cancelAnimationFrame(raf);window.removeEventListener("resize",on);};
}

function mountLitMap(c,onToggle){
  const canvas=c.querySelector("#mapCanvas"),ctx=canvas.getContext("2d");
  const tip=c.querySelector("#starTip"),legend=c.querySelector("#mapLegend");
  let W=0,Hc=0,DPR=Math.min(devicePixelRatio||1,2);
  let colorBy="year",sizeBy="vars",showLabels=true,hoverP=null,alive=true,raf,bg=[],embedded=false;
  let cam={s:1,tx:0,ty:0},drag=null,downOnP=null,searchQ="";
  const yearFilter=new Set();
  const ROLE_HEX={};ROLES.forEach(r=>ROLE_HEX[r]=css(ROLE_VAR[r])||"#8892a8");
  const years=[...new Set(papers.map(p=>p.year))].sort((a,b)=>a-b);
  const YEAR_RAMP=["#6c5ce7","#4d7cff","#3fb6e6","#38d9a9","#ffd43b","#ff922b","#ff6b8a"];
  const yearColor=y=>{const i=years.indexOf(y);return YEAR_RAMP[Math.round(i/Math.max(years.length-1,1)*(YEAR_RAMP.length-1))];};
  function scol(p){if(colorBy==="year")return yearColor(p.year);if(colorBy==="family")return FAM_COLOR[p.fam];
    if(colorBy==="module")return MOD_COLOR[p.module_code];return ROLE_HEX[p.domRole];}
  function sizeVal(p){if(sizeBy==="vars")return p.nlinks/maxLinks;
    if(sizeBy==="recency")return (p.year-years[0])/Math.max(years[years.length-1]-years[0],1);
    return (p.priorityRank-1)/2;}
  function radius(p){return 5+sizeVal(p)*15;}

  function computeEmbedding(){
    const N=papers.length,k=0.17;
    papers.forEach(p=>{const a=hash(p.paper_id)*6.283;p.wx=0.5+Math.cos(a)*0.28;p.wy=0.5+Math.sin(a)*0.28;});
    let maxSh=1;Object.values(pairShared).forEach(v=>{if(v>maxSh)maxSh=v;});
    const edges=Object.entries(pairShared).map(([kk,sh])=>{const[a,b]=kk.split("|");return[pById[a],pById[b],sh];});
    for(let it=0;it<300;it++){const temp=0.05*(1-it/300)+0.003;
      const dx=new Map(),dy=new Map();papers.forEach(p=>{dx.set(p,0);dy.set(p,0);});
      for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){const a=papers[i],b=papers[j];
        let ex=a.wx-b.wx,ey=a.wy-b.wy,d=Math.hypot(ex,ey)||1e-4;const f=k*k/d;ex/=d;ey/=d;
        dx.set(a,dx.get(a)+ex*f);dy.set(a,dy.get(a)+ey*f);dx.set(b,dx.get(b)-ex*f);dy.set(b,dy.get(b)-ey*f);}
      edges.forEach(([a,b,sh])=>{let ex=a.wx-b.wx,ey=a.wy-b.wy,d=Math.hypot(ex,ey)||1e-4;const f=d*d/k*(0.3+sh/maxSh);ex/=d;ey/=d;
        dx.set(a,dx.get(a)-ex*f);dy.set(a,dy.get(a)-ey*f);dx.set(b,dx.get(b)+ex*f);dy.set(b,dy.get(b)+ey*f);});
      papers.forEach(p=>{let mx=dx.get(p),my=dy.get(p),ml=Math.hypot(mx,my)||1e-4,lim=Math.min(ml,temp);
        p.wx=Math.max(0.04,Math.min(0.96,p.wx+mx/ml*lim));p.wy=Math.max(0.04,Math.min(0.96,p.wy+my/ml*lim));});}
    const xs=papers.map(p=>p.wx),ys=papers.map(p=>p.wy);
    const mnx=Math.min(...xs),mxx=Math.max(...xs),mny=Math.min(...ys),mxy=Math.max(...ys);
    papers.forEach(p=>{p.wx=0.09+(p.wx-mnx)/((mxx-mnx)||1)*0.82;p.wy=0.11+(p.wy-mny)/((mxy-mny)||1)*0.78;});
  }
  function layout(){const rect=canvas.getBoundingClientRect();W=rect.width;Hc=rect.height;canvas.width=W*DPR;canvas.height=Hc*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    if(!embedded){computeEmbedding();embedded=true;}
    bg=[];for(let i=0;i<160;i++)bg.push({x:Math.random(),y:Math.random(),r:Math.random()*1.1+.2,ph:Math.random()*7});}
  const sx=p=>p.wx*W*cam.s+cam.tx, sy=p=>p.wy*Hc*cam.s+cam.ty;
  const visible=p=>!(yearFilter.size&&!yearFilter.has(p.year));
  const matchQ=p=>!searchQ||((p.paper_id+" "+p.citation+" "+p.module+" "+p.fam).toLowerCase().includes(searchQ.toLowerCase()));

  const t0=performance.now();
  function draw(now){if(!alive)return;const t=(now-t0)/1000;ctx.clearRect(0,0,W,Hc);
    const g=ctx.createRadialGradient(W*.5,Hc*.45,20,W*.5,Hc*.45,Math.max(W,Hc)*.75);g.addColorStop(0,"rgba(88,80,230,.10)");g.addColorStop(.5,"rgba(60,90,180,.045)");g.addColorStop(1,"rgba(7,11,21,0)");ctx.fillStyle=g;ctx.fillRect(0,0,W,Hc);
    bg.forEach(s=>{const a=REDUCED?.5:.3+.35*Math.sin(t*1.3+s.ph);ctx.globalAlpha=a;ctx.fillStyle="#aeb9d6";ctx.beginPath();ctx.arc(s.x*W,s.y*Hc,s.r,0,7);ctx.fill();});ctx.globalAlpha=1;
    papers.forEach(p=>{const X=sx(p),Y=sy(p);if(X<-40||X>W+40||Y<-40||Y>Hc+40)return;
      const col=scol(p),ex=state.excluded.has(p.paper_id),vis=visible(p)&&matchQ(p),hot=hoverP&&hoverP.paper_id===p.paper_id;
      const pr=radius(p)*(hot?1.3:1);ctx.globalAlpha=(!vis||ex)?0.14:1;
      const rg=ctx.createRadialGradient(X,Y,0,X,Y,pr*2.6);rg.addColorStop(0,col+"cc");rg.addColorStop(.4,col+"55");rg.addColorStop(1,col+"00");
      ctx.fillStyle=rg;ctx.beginPath();ctx.arc(X,Y,pr*2.6,0,7);ctx.fill();
      ctx.fillStyle=hot?"#fff":col;ctx.beginPath();ctx.arc(X,Y,pr,0,7);ctx.fill();
      if(ex&&vis){ctx.globalAlpha=.65;ctx.strokeStyle="#e35a5a";ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(X-pr,Y-pr);ctx.lineTo(X+pr,Y+pr);ctx.stroke();}
      ctx.globalAlpha=1;});
    if(showLabels){ctx.textAlign="center";
      FAMILIES.forEach(f=>{const mem=papers.filter(p=>p.fam===f&&visible(p));if(!mem.length)return;let cx=0,cy=0;mem.forEach(p=>{cx+=sx(p);cy+=sy(p);});cx/=mem.length;cy/=mem.length;
        ctx.fillStyle="rgba(196,206,230,.42)";ctx.font="600 12px "+css("--font-sans").split(",")[0];ctx.fillText(f.toUpperCase(),cx,cy-34);});
      papers.forEach(p=>{if(!visible(p))return;const X=sx(p),Y=sy(p),pr=radius(p),hot=hoverP&&hoverP.paper_id===p.paper_id;
        if(p.nlinks>=15||hot){ctx.fillStyle=hot?"#fff":"rgba(215,222,240,.85)";ctx.font="11px "+css("--font-mono").split(",")[0];ctx.fillText(shortLabel(p),X,Y-pr-6);}});}
    raf=requestAnimationFrame(draw);}

  function renderLegend(){let items,title;
    if(colorBy==="year"){title="Year";items=years.map(y=>[String(y),yearColor(y)]);}
    else if(colorBy==="family"){title="Registry";items=FAMILIES.map(f=>[f,FAM_COLOR[f]]);}

  function renderHist(){const hist=c.querySelector("#lithist");hist.innerHTML="";
    const counts={};years.forEach(y=>counts[y]=0);papers.forEach(p=>counts[p.year]++);const mx=Math.max(...Object.values(counts));
    years.forEach(y=>{const hb=el("div","hb"+(yearFilter.has(y)?" on":""));
      hb.innerHTML=`<div class="bar" style="height:${Math.max(3,counts[y]/mx*38)}px"></div><div class="yl">${y}</div>`;hb.title=`${counts[y]} papers · ${y}`;
      hb.addEventListener("click",()=>{yearFilter.has(y)?yearFilter.delete(y):yearFilter.add(y);renderHist();});hist.appendChild(hb);});}

  function pick(mx,my){let best=null,bd=1e9;papers.forEach(p=>{if(!visible(p))return;const d=Math.hypot(sx(p)-mx,sy(p)-my),rr=Math.max(radius(p)+6,13);if(d<rr&&d<bd){bd=d;best=p;}});return best;}
  const rel=e=>{const r=canvas.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top];};
  const mm=e=>{const[mx,my]=rel(e);
    if(drag){cam.tx+=mx-drag.x;cam.ty+=my-drag.y;drag.x=mx;drag.y=my;canvas.style.cursor="grabbing";return;}
    const p=pick(mx,my);hoverP=p;
    if(p){canvas.style.cursor="pointer";const cite=(p.citation||""),cs=cite.length>96?cite.slice(0,94)+"…":cite,exd=state.excluded.has(p.paper_id);
      tip.innerHTML=`<div class="id">${p.paper_id}</div><div class="ti">${esc(p.module||"")}</div>
        <div class="rl" style="font-size:11.5px;line-height:1.35">${esc(cs)}</div>
        <div class="rl"><b>${p.fam}</b> · ${esc(p.publication_year)} · module ${p.module_code}</div>
        <div class="rl">Contributes <b>${p.nlinks}</b> variables · Cosmos <b>${esc(p.cosmos_availability)}</b></div>
        <div class="rl" style="color:${exd?'#e35a5a':'#8fd6a0'}">${exd?'excluded — click to include':'included — click to exclude'}</div>`;
      let tx=mx+16,ty=my+8;if(tx+300>W)tx=mx-300;if(ty+156>Hc)ty=my-156;tip.style.left=tx+"px";tip.style.top=ty+"px";tip.classList.add("show");}
    else{canvas.style.cursor="grab";tip.classList.remove("show");}};
  const mdn=e=>{const[mx,my]=rel(e);const p=pick(mx,my);if(p){downOnP=p;drag=null;}else{drag={x:mx,y:my};downOnP=null;canvas.style.cursor="grabbing";}};
  const mup=e=>{if(downOnP){const[mx,my]=rel(e);const p=pick(mx,my);if(p&&p===downOnP){state.excluded.has(p.paper_id)?state.excluded.delete(p.paper_id):state.excluded.add(p.paper_id);if(onToggle)onToggle();}downOnP=null;}drag=null;};
  const wheel=e=>{e.preventDefault();const[cx,cy]=rel(e);const f=e.deltaY<0?1.12:1/1.12,ns=Math.max(0.6,Math.min(6,cam.s*f));cam.tx=cx-(cx-cam.tx)*ns/cam.s;cam.ty=cy-(cy-cam.ty)*ns/cam.s;cam.s=ns;};
  const zoom=f=>{const cx=W/2,cy=Hc/2,ns=Math.max(0.6,Math.min(6,cam.s*f));cam.tx=cx-(cx-cam.tx)*ns/cam.s;cam.ty=cy-(cy-cam.ty)*ns/cam.s;cam.s=ns;};
  canvas.addEventListener("mousemove",mm);canvas.addEventListener("mousedown",mdn);window.addEventListener("mouseup",mup);
  canvas.addEventListener("mouseleave",()=>{hoverP=null;tip.classList.remove("show");});
  canvas.addEventListener("wheel",wheel,{passive:false});
  c.querySelector("#colorBy").addEventListener("change",e=>{colorBy=e.target.value;renderLegend();});
  c.querySelector("#sizeBy").addEventListener("change",e=>{sizeBy=e.target.value;});
  const ltog=c.querySelector("#labelTog");ltog.addEventListener("click",()=>{showLabels=!showLabels;ltog.classList.toggle("on",showLabels);});
  c.querySelector("#mapSearch").addEventListener("input",e=>searchQ=e.target.value);
  c.querySelector("#zin").addEventListener("click",()=>zoom(1.25));
  c.querySelector("#zout").addEventListener("click",()=>zoom(1/1.25));
  c.querySelector("#zreset").addEventListener("click",()=>{cam={s:1,tx:0,ty:0};});
  const on=()=>layout();window.addEventListener("resize",on);
  layout();renderLegend();renderHist();raf=requestAnimationFrame(draw);
  return ()=>{alive=false;cancelAnimationFrame(raf);window.removeEventListener("resize",on);window.removeEventListener("mouseup",mup);};
}

function mountTaxonomy(c){
  let availFilter=new Set(),roleFilter=new Set(),searchQ="";
  const tree=c.querySelector("#taxTree"),hint=c.querySelector("#filterHint");
  const varsByCat={};catOrder.forEach(cat=>varsByCat[cat]=variables.filter(v=>v.category===cat));
  function match(v,q){if(!q)return true;const terms=q.toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>2);if(!terms.length)return true;
    const hay=(v.variable_id+" "+v.variable_name+" "+v.category+" "+v.operational_definition+" "+v.roles.join(" ")+" "+(v.cosmos_source_tables||"")).toLowerCase();return terms.some(t=>hay.includes(t));}
  function passFilter(v){if(availFilter.size&&!availFilter.has(v.cosmos_availability))return false;
    if(roleFilter.size&&!v.roles.some(r=>roleFilter.has(r)))return false;return match(v,searchQ);}
  const filterActive=()=>availFilter.size||roleFilter.size||searchQ.trim().length>0;

  const availChips=c.querySelector("#availChips");
  [["High","✓ Cosmos: High"],["Medium","~ Medium"],["Low","! Low"]].forEach(a=>{const b=el("button","fchip",a[1]);
    b.addEventListener("click",()=>{b.classList.toggle("on");availFilter.has(a[0])?availFilter.delete(a[0]):availFilter.add(a[0]);renderTree();});availChips.appendChild(b);});
  const roleChips=c.querySelector("#roleChips");
  ROLES.forEach(r=>{const b=el("button","fchip",`<span class="fx" style="background:var(${ROLE_VAR[r]})"></span>${r}`);
    b.addEventListener("click",()=>{b.classList.toggle("on");roleFilter.has(r)?roleFilter.delete(r):roleFilter.add(r);renderTree();});roleChips.appendChild(b);});
  c.querySelector("#search").addEventListener("input",e=>{searchQ=e.target.value;
    hint.innerHTML=searchQ.trim()?`Chat filter active — matching variables highlighted, others dimmed. Ticking a module or subcategory adds only the matching ones.`:"";renderTree();});

  function renderTree(){
    const fa=filterActive();let html="";
    MODULES.forEach(([mcode,mname])=>{
      const cats=catOrder.filter(cat=>CAT_MODULE[cat]===mcode);
      const mvars=cats.flatMap(cat=>varsByCat[cat]);
      const mgroup=fa?mvars.filter(passFilter):mvars;
      const selN=mgroup.filter(v=>state.selected.has(v.variable_id)).length;
      const allSel=mgroup.length>0&&selN===mgroup.length,someSel=selN>0&&!allSel;
      html+=`<div class="tcol" style="--mc:${MOD_COLOR[mcode]}">
        <div class="tcolh">
          <input type="checkbox" class="cbx" data-modsel="${mcode}" ${allSel?"checked":""} ${someSel?'data-some="1"':""} aria-label="Select module ${mcode}">
          <span class="mbadge">${mcode}</span><span class="mnm">${esc(mname)}</span><span class="mct">${selN}/${mvars.length}</span></div>`;
      cats.forEach(cat=>{
        const cvars=varsByCat[cat],sc=SUBCAT[cat];
        const cselGroup=fa?cvars.filter(passFilter):cvars;
        const cselN=cselGroup.filter(v=>state.selected.has(v.variable_id)).length;
        const callSel=cselGroup.length>0&&cselN===cselGroup.length,csome=cselN>0&&!callSel;
        html+=`<div class="tsc">
          <div class="tsch">
            <input type="checkbox" class="cbx" data-subsel="${esc(cat)}" ${callSel?"checked":""} ${csome?'data-some="1"':""} aria-label="Select ${esc(cat)}">
            <span class="sccode">${sc?sc.code:""}</span><span class="scnm">${esc(cat)}</span><span class="scct">${cselN}/${cvars.length}</span></div>
          <div class="tscvars">`;
        cvars.forEach(v=>{const dim=fa&&!passFilter(v);
          html+=`<label class="pvar${dim?" dim":""}">
            <input type="checkbox" class="cbx" data-var="${v.variable_id}" ${state.selected.has(v.variable_id)?"checked":""}>
            <span class="pvn"><span class="vid">${v.variable_id}</span> ${esc(v.variable_name)}</span>
            <span class="pvm"><span class="availsq ${v.cosmos_availability}" title="${v.cosmos_availability} availability in Cosmos">${v.cosmos_availability[0]}</span><span class="ctype" title="${v.core_status}">${v.core_status==="Core"?"●":"○"}</span></span>
          </label>`;});
        html+=`</div>${sc?`<div class="scq"><b>Q:</b> ${esc(sc.q)}</div><div class="scseed">Seeds: ${sc.seeds.join(" · ")}</div>`:""}</div>`;
      });
      html+=`</div>`;
    });
    tree.innerHTML=html;
    tree.querySelectorAll("input[data-some]").forEach(cb=>cb.indeterminate=true);
    renderSel();
  }
  function toggleGroup(vars,on){vars.forEach(v=>on?state.selected.add(v.variable_id):state.selected.delete(v.variable_id));}
  tree.addEventListener("change",e=>{
    const cb=e.target;if(!cb.classList.contains("cbx"))return;
    if(cb.dataset.var){cb.checked?state.selected.add(cb.dataset.var):state.selected.delete(cb.dataset.var);}
    else if(cb.dataset.modsel){const cats=catOrder.filter(cat=>CAT_MODULE[cat]===cb.dataset.modsel);
      let g=cats.flatMap(cat=>varsByCat[cat]);if(filterActive())g=g.filter(passFilter);toggleGroup(g,cb.checked);}
    else if(cb.dataset.subsel){let g=varsByCat[cb.dataset.subsel]||[];if(filterActive())g=g.filter(passFilter);toggleGroup(g,cb.checked);}
    renderTree();buildNav();updateSession();
  });

  function renderSel(){
    c.querySelector("#cartCount").textContent=state.selected.size;
    const sel=variables.filter(v=>state.selected.has(v.variable_id)),rc={Exposure:0,Outcome:0,Adjustment:0,Subgroup:0};

  }

  const RECS=[
    {t:"Post-EAST-AFNET-4 adoption of early rhythm control across US care settings",nov:"High",fea:"High",imp:"High",n:"~110,000"},
    {t:"Off-label DOAC dosing trends in incident AF and 1-year stroke/bleeding",nov:"Medium",fea:"Medium",imp:"High",n:"~70,000"},
    {t:"Rural vs urban access to catheter ablation and LAAO after incident AF",nov:"High",fea:"Medium",imp:"Medium",n:"~40,000"},
  ];
  const scoreColor=s=>s==="High"?"var(--good)":s==="Medium"?"var(--warning)":"var(--critical)";
  c.querySelector("#recs").innerHTML=`<div class="warnbox"><b>Heads-up.</b> Your original question (rhythm-vs-rate trends) is partly addressed by <b>TEPPO 2023</b> and <b>NAVAR 2022</b>. Consider a US-specific, post-2020 extension — or refine population/era to differentiate your contribution.</div>`+
    RECS.map(r=>`<div class="rec"><h4>${esc(r.t)}</h4><div class="scores">
      <div class="sc"><div class="lab">Novelty</div><div class="val" style="color:${scoreColor(r.nov)}">${r.nov}</div></div>
      <div class="sc"><div class="lab">Feasibility</div><div class="val" style="color:${scoreColor(r.fea)}">${r.fea}</div></div>
      <div class="sc"><div class="lab">Clinical impact</div><div class="val" style="color:${scoreColor(r.imp)}">${r.imp}</div></div>
      <div class="sc"><div class="lab">Est. eligible N</div><div class="val mono">${r.n}</div></div></div></div>`).join("");
  function selRows(){return variables.filter(v=>state.selected.has(v.variable_id)).map(v=>({
    variable_id:v.variable_id,variable_name:v.variable_name,category:v.category,module:CAT_MODULE[v.category],
    roles:v.roles.join("|"),cosmos_availability:v.cosmos_availability,core_status:v.core_status,
    cosmos_source_tables:v.cosmos_source_tables,n_papers:(v.links||[]).length,source_papers:(v.links||[]).map(l=>l.paper_id).join("|")}));}
  function dl(name,text,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
  c.querySelector("#expCsv").addEventListener("click",()=>{const rows=selRows();if(!rows.length){alert("Select at least one variable first.");return;}
    const cols=Object.keys(rows[0]);const csv=[cols.join(",")].concat(rows.map(r=>cols.map(cc=>`"${String(r[cc]).replace(/"/g,'""')}"`).join(","))).join("\n");
    dl("afib_variable_selection.csv",csv,"text/csv");});
  c.querySelector("#expJson").addEventListener("click",()=>{const rows=selRows();if(!rows.length){alert("Select at least one variable first.");return;}
    dl("afib_variable_selection.json",JSON.stringify({run:state.runId,selected_count:rows.length,variables:rows},null,2),"application/json");});
  renderTree();
}

/* ===================== STEP 4.5 ===================== */
const ASSUMPTIONS=[
  {id:"lookback",txt:"Incident AF is defined using a 365-day clean lookback period",tag:"verifiable_in_cosmos",risk:"Sites with short enrollment history may not support this lookback."},
  {id:"sotalol",txt:"Sotalol is classified as a rhythm-control agent in the primary analysis",tag:"domain_expert_judgment",risk:"Some analyses treat sotalol as dual-purpose; sensitivity analysis recommended."},
  {id:"oac",txt:"OAC eligibility uses CHA₂DS₂-VASc ≥ 2 threshold",tag:"guideline_dependent",risk:"2024 ESC guideline uses CHA₂DS₂-VA; cross-guideline sensitivity may be needed."},
  {id:"edinpt",txt:"ED-to-inpatient AF episodes are classified as index hospitalizations",tag:"domain_expert_judgment",risk:"ED-origin flag retained for subgroup analysis."},
  {id:"flutter",txt:"Atrial flutter (I48.2/I48.3/I48.4/I48.9) is excluded from the cohort",tag:"verifiable_in_cosmos",risk:"Mixed AF/flutter coding may misclassify a small share."},
];
function renderStep45(){
  const r=routeById.step45;
  const html=phead(r,"Before a plan is drafted, every key assumption embedded in the scope and variable selection is made explicit. You confirm, modify, or flag each one. This registry is versioned and referenced in the SAP and the data plan.")+`
  <div class="chips" style="margin-bottom:16px">
    <span class="atag verifiable_in_cosmos">verifiable_in_cosmos — checkable with a pilot query</span>
    <span class="atag domain_expert_judgment">domain_expert_judgment — needs clinical input</span>
    <span class="atag guideline_dependent">guideline_dependent — tied to a guideline version</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px" id="asms"></div>
  <div class="card" style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
    <div class="small muted" id="asmSummary"></div>
    <span class="badge" id="asmBadge" style="background:var(--surface-3);color:var(--ink-3)">registry pending</span>
  </div>
  <div class="callout" style="margin-top:14px"><b>Not optional.</b> The assumption registry is the bridge between researcher intent and system implementation — and documentation for IRB submission and peer review.</div>`+pnav(r);
  return {html,mount(c){
    const wrap=c.querySelector("#asms");
    function summary(){const n=state.assumptionsConfirmed.size;c.querySelector("#asmSummary").innerHTML=`<b class="tnum">${n}</b> of ${ASSUMPTIONS.length} assumptions confirmed.`;
      const b=c.querySelector("#asmBadge");if(n>=ASSUMPTIONS.length){b.className="badge a-High";b.textContent="✓ registry complete";}else if(n>0){b.className="badge a-Medium";b.textContent="~ in progress";}else{b.className="badge";b.style.background="var(--surface-3)";b.style.color="var(--ink-3)";b.textContent="registry pending";}
      buildNav();}
    ASSUMPTIONS.forEach(a=>{const d=el("div","asm");
      d.innerHTML=`<input type="checkbox" class="cbx" ${state.assumptionsConfirmed.has(a.id)?"checked":""} aria-label="Confirm assumption">
        <div style="flex:1"><div style="font-weight:600;font-size:14px">${esc(a.txt)}</div>
          <div class="chkline" style="margin-top:6px"><span class="atag ${a.tag}">${a.tag}</span><span class="muted small">Risk: ${esc(a.risk)}</span></div></div>`;
      d.querySelector(".cbx").addEventListener("change",e=>{e.target.checked?state.assumptionsConfirmed.add(a.id):state.assumptionsConfirmed.delete(a.id);summary();});
      wrap.appendChild(d);});
    summary();
  }};
}

/* ===================== STEP 5 ===================== */
function renderStep5(){
  const r=routeById.step5;
  const sel=variables.filter(v=>state.selected.has(v.variable_id));
  const useVars=sel.length?sel:variables.filter(v=>v.core_status==="Core");
  const byCat={};useVars.forEach(v=>{(byCat[v.category]=byCat[v.category]||[]).push(v);});
  const aims=[["Aim 1","Describe quarterly trends in rhythm vs rate control, 2018 onward","Rhythm-control uptake has risen after landmark trials"],
    ["Aim 2","Track AF phenotype progression (paroxysmal→persistent→permanent)","Progression differs by initial strategy"],
    ["Aim 3","Evaluate anticoagulation quality (OAC/DOAC) across strategies","OAC quality differs between rhythm and rate control"],
    ["Aim 4","Compare 1- and 3-year outcomes (mortality, stroke, rehospitalization)","Early rhythm control is associated with better outcomes"]];
  const html=phead(r,"Using the confirmed scope, variable selection, and assumption registry, the system drafts a full Statistical Analysis Plan. It is a draft — clearly labeled, requiring researcher sign-off.")+`
  <div class="draftbanner">⚠ System-generated draft · v0.3 · requires researcher review and sign-off before use</div>
  <div class="doc">
    <div class="kicker">Statistical Analysis Plan</div>
    <h2 style="border:none;margin-top:6px">Contemporary Trends in Rhythm vs Rate Control for Incident Atrial Fibrillation</h2>
    <p>Their association with anticoagulation quality and clinical outcomes, in the Epic Cosmos incident-AF cohort.</p>
    <div class="kv"><span class="k">Data source</span><span class="v">Epic Cosmos patient-level data</span></div>
    <div class="kv"><span class="k">Run</span><span class="v mono">${esc(state.runId)}</span></div>
    <div class="kv"><span class="k">Variables carried in</span><span class="v">${useVars.length}${sel.length?"":" (core default — none selected yet)"}</span></div>

    <h2>Specific aims</h2>
    <div class="scrollx"><table class="t"><thead><tr><th>Aim</th><th>Objective</th><th>Primary hypothesis</th></tr></thead><tbody>
      ${aims.map(a=>`<tr><td><b>${a[0]}</b></td><td>${esc(a[1])}</td><td class="muted">${esc(a[2])}</td></tr>`).join("")}</tbody></table></div>

    <h2>Study population</h2>
    <p>Adults first diagnosed with AF during an ED visit or hospitalization, 2018 onward, with a clean 365-day lookback. Atrial flutter excluded. Expected N &gt; 110,000.</p>
    <div class="scrollx"><table class="t"><thead><tr><th>ICD-10</th><th>Description</th><th>Role</th></tr></thead><tbody>
      <tr><td class="mono">I48.0</td><td>Paroxysmal atrial fibrillation</td><td>Include</td></tr>
      <tr><td class="mono">I48.11 / I48.19</td><td>Persistent / longstanding & other persistent AF</td><td>Include</td></tr>
      <tr><td class="mono">I48.21</td><td>Permanent atrial fibrillation</td><td>Include</td></tr>
      <tr><td class="mono">I48.2 / I48.3 / I48.4 / I48.9</td><td>Atrial flutter / unspecified</td><td class="muted">Exclude</td></tr></tbody></table></div>

    <h2>Definitions & key variables</h2>
    <p>Organized by domain, drawn from your Step 4 selection.</p>
    ${Object.keys(byCat).map(cat=>`<h3>${esc(cat)} <span class="muted mono" style="font-size:11px">(${byCat[cat].length})</span></h3>
      <div class="chkline">${byCat[cat].map(v=>`<span class="tag cat">${v.variable_id} · ${esc(v.variable_name)}</span>`).join("")}</div>`).join("")}

    <h2>Exposure groups</h2>
    <p><b>Rhythm control</b> — antiarrhythmic drugs, cardioversion, catheter ablation. <b>Rate control</b> — beta-blockers, non-dihydropyridine calcium channel blockers, digoxin. Sotalol classified per the confirmed assumption registry.</p>
    <h2>Outcomes</h2>
    <p>Primary: all-cause mortality, ischemic stroke/systemic embolism, AF-related hospitalization at 1 and 3 years. Secondary: phenotype progression, OAC/DOAC quality.</p>
  </div>
  <div style="display:flex;gap:10px;margin-top:16px"><button class="btn primary" id="expMd">Export Markdown</button><button class="btn" id="expDocx" title="Word export runs server-side in the full product">Export Word (.docx)</button></div>`+pnav(r);
  return {html,mount(c){
    c.querySelector("#expMd").addEventListener("click",()=>{
      let md=`# Statistical Analysis Plan (DRAFT v0.3)\n\n## Contemporary Trends in Rhythm vs Rate Control for Incident AF\n\nData source: Epic Cosmos · Run: ${state.runId}\n\n## Specific Aims\n`;
      aims.forEach(a=>md+=`- **${a[0]}** — ${a[1]} (H: ${a[2]})\n`);
      md+=`\n## Study Population\nAdults, incident AF in ED/inpatient, 2018+, 365-day clean lookback, flutter excluded. N > 110,000.\nICD-10 include: I48.0, I48.11, I48.19, I48.21.\n\n## Key Variables (${useVars.length})\n`;
      Object.keys(byCat).forEach(cat=>{md+=`\n### ${cat}\n`;byCat[cat].forEach(v=>md+=`- ${v.variable_id} ${v.variable_name} — Cosmos: ${v.cosmos_availability}\n`);});
      const b=new Blob([md],{type:"text/markdown"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="afib_SAP_draft.md";a.click();URL.revokeObjectURL(u);});
    c.querySelector("#expDocx").addEventListener("click",()=>alert("Word (.docx) export runs server-side in the full product. Markdown export is available now."));
  }};
}

/* ===================== STEP 6 ===================== */
function renderStep6(){
  const r=routeById.step6;
  const sel=variables.filter(v=>state.selected.has(v.variable_id));
  const useVars=sel.length?sel:variables.filter(v=>v.core_status==="Core");
  const riskOf=a=>a==="High"?["Low","Proceed as planned"]:a==="Medium"?["Moderate","Validate in pilot query; consider proxy/fallback"]:["High","Add sensitivity analysis; define proxy or exclude dose-ineligible"];
  const av=availOf(useVars);const score=Math.round((av.High*1+av.Medium*.6+av.Low*.25)/Math.max(useVars.length,1)*100);
  const html=phead(r,"Before the data plan is finalized, every selected variable is checked for Cosmos feasibility. Nothing is silently dropped — each concern is surfaced with a recommended action.")+`
  <div class="grid3" style="margin-bottom:18px">
    <div class="stat"><div class="v tnum">${useVars.length}</div><div class="k">Variables checked${sel.length?"":" (core default)"}</div></div>
    <div class="stat"><div class="v tnum">${score}<span style="font-size:16px">%</span></div><div class="k">Feasibility score</div>
      <div class="scorebar"><span style="width:${score}%;background:${score>=75?"var(--good)":score>=55?"var(--warning)":"var(--critical)"}"></span></div></div>
    <div class="stat"><div class="v tnum">${av.Low}</div><div class="k">High-risk variables</div></div>
  </div>
  <div class="scrollx"><table class="t"><thead><tr><th>Variable</th><th>Cosmos availability</th><th>Completeness risk</th><th>Recommended action</th></tr></thead><tbody>
    ${useVars.map(v=>{const [risk,act]=riskOf(v.cosmos_availability);return `<tr>
      <td><span class="mono" style="font-size:11px;color:var(--ink-3)">${v.variable_id}</span><br>${esc(v.variable_name)}</td>
      <td><span class="badge a-${v.cosmos_availability}">${v.cosmos_availability}</span></td>
      <td>${risk==="High"?'<span style="color:var(--critical)">High</span>':risk==="Moderate"?'<span style="color:var(--warning)">Moderate</span>':'<span style="color:var(--good)">Low</span>'}</td>
      <td class="muted">${act}</td></tr>`;}).join("")}</tbody></table></div>
  <div class="callout" style="margin-top:16px"><b>Researcher sees this before finalizing.</b> Completeness threshold default 70%. Fallback variables and proxy definitions are suggested where available; no variable is dropped without surfacing why.</div>`+pnav(r);
  return {html};
}

/* ===================== STEP 7 ===================== */
function renderStep7(){
  const r=routeById.step7;
  const sel=variables.filter(v=>state.selected.has(v.variable_id));
  const useVars=sel.length?sel:variables.filter(v=>v.core_status==="Core");
  const funnel=[["All Epic Cosmos adults with an AF diagnosis",5200000,"var(--accent)"],
    ["AF dx at ED visit or hospitalization, 2018+",980000],["Incident (365-day clean lookback)",420000],
    ["Exclude atrial flutter & unspecified",150000],["Final analytic cohort",112000]];
  const mx=funnel[0][1];
  // variable→table matrix
  const rows=useVars.slice(0,40);
  const html=phead(r,"The confirmed variables, SAP, assumption registry, and pre-check produce a structured Cosmos extraction plan: cohort logic, a variable-to-table map, and a pilot query scope.")+`
  <h3 style="font-family:var(--font-display);font-size:19px;margin:0 0 4px">Cohort construction funnel</h3>
  <p class="muted small" style="margin:0 0 16px">Enrollment logic with illustrative counts (validate in the pilot query).</p>
  <div class="funnel">
    ${funnel.map((f,i)=>`<div class="fstep"><div class="fbar" style="width:${Math.max(18,f[1]/mx*100)}%;${f[2]?`background:${f[2]}`:""}">${(f[1]/1000).toLocaleString()}k</div>
      <div class="fl2"><b>${esc(f[0])}</b></div></div>`).join("")}
  </div>

  <div class="grid2" style="margin-top:24px">
    <div class="card"><h3>Pilot query scope</h3><p class="lead">Run before full extraction to validate feasibility.</p>
      <div class="kv"><span class="k">Era</span><span class="v">2018 Q1 – 2019 Q4</span></div>
      <div class="kv"><span class="k">Sites</span><span class="v">≥ 24-month enrollment history</span></div>
      <div class="kv"><span class="k">Checks</span><span class="v" style="max-width:60%">Lookback support, echo/EF availability, weight+creatinine for DOAC dosing</span></div>
    </div>
    <div class="card"><h3>Analytic populations</h3>
      <div class="kv"><span class="k">Primary</span><span class="v">Incident AF, strategy-classified</span></div>
      <div class="kv"><span class="k">Subgroups</span><span class="v" style="max-width:60%">AF phenotype · HF status · OAC eligibility · rural/urban</span></div>
      <div class="kv"><span class="k">Sensitivity</span><span class="v" style="max-width:60%">Sotalol reclassified · dose-eligible only · guideline threshold</span></div>
    </div>
  </div>

  <h3 style="font-family:var(--font-display);font-size:19px;margin:26px 0 4px">Variable → Cosmos table mapping <span class="muted" style="font-size:14px;font-weight:400">(${useVars.length} variables${sel.length?"":" · core default"})</span></h3>
  <div class="scrollx"><table class="t"><thead><tr><th>Variable</th><th>Role(s)</th><th>Cosmos source tables</th><th>Availability</th></tr></thead><tbody>
    ${rows.map(v=>`<tr><td><span class="mono" style="font-size:11px;color:var(--ink-3)">${v.variable_id}</span> ${esc(v.variable_name)}</td>
      <td class="chkline">${v.roles.map(roleTag).join("")}</td>
      <td class="mono" style="font-size:11px">${esc(v.cosmos_source_tables||"—")}</td>
      <td><span class="badge a-${v.cosmos_availability}">${v.cosmos_availability}</span></td></tr>`).join("")}
    ${useVars.length>40?`<tr><td colspan="4" class="muted">+ ${useVars.length-40} more…</td></tr>`:""}</tbody></table></div>
  <div class="callout" style="margin-top:16px"><b>Outputs.</b> All exportable as Excel (raw data) and PDF (formatted plan). This is where the confirmed variable list hands off to Epic Cosmos extraction.</div>`+pnav(r);
  return {html};
}

/* ===================== boot ===================== */
buildNav();go();
</script>
